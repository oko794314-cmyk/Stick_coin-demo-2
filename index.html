<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stick Coin Demo - Modular Architecture</title>
  <link rel="stylesheet" href="styles/global.css">
</head>
<body>
  <div class="app-container">
    <nav class="sidebar">
      <ul class="nav-menu">
        <li><a href="#exchange" data-module="exchange">💱 Exchange</a></li>
        <li><a href="#news" data-module="news">📰 News</a></li>
        <li><a href="#mining" data-module="mining">⛏️ Mining</a></li>
        <li><a href="#casino" data-module="casino">🎰 Casino</a></li>
        <li><a href="#workshop" data-module="workshop">🛠️ Workshop</a></li>
        <li><a href="#marketplace" data-module="marketplace">🏪 Marketplace</a></li>
        <li><a href="#profile" data-module="profile">👤 Profile</a></li>
        <li><a href="#transfers" data-module="transfers">💸 Transfers</a></li>
        <li><a href="#economy" data-module="economy">📊 Economy</a></li>
        <li><a href="#buildings" data-module="buildings">🏢 Buildings</a></li>
        <li><a href="#rankings" data-module="rankings">🏆 Rankings</a></li>
      </ul>
    </nav>
    
    <main class="main-content">
      <div id="exchange-container" class="module-container"></div>
      <div id="news-container" class="module-container"></div>
      <div id="mining-container" class="module-container"></div>
      <div id="casino-container" class="module-container"></div>
      <div id="workshop-container" class="module-container"></div>
      <div id="marketplace-container" class="module-container"></div>
      <div id="profile-container" class="module-container"></div>
      <div id="transfers-container" class="module-container"></div>
      <div id="economy-container" class="module-container"></div>
      <div id="buildings-container" class="module-container"></div>
      <div id="rankings-container" class="module-container"></div>
      <div id="notifications-container" class="module-container"></div>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
