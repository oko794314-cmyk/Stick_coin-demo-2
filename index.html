<!DOCTYPE html>
<html lang="uk">
<head>

    <!-- СИЛОВА ОЧИСТКА КЕШУ - v2026052124 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>BB COIN - ULTIMATE CRYPTO GAMING</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <!-- 🔥 FIREBASE SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { --p: #07FFFF; --bg: #030303; --card: #0d0d0d; --g: #00ff88; --r: #ff3366; --gold: #ffcc00; --black: #1a1a1a; --app-nav-safe-bottom: calc(20px + env(safe-area-inset-bottom, 0px)); --view-bottom-padding: 124px; --view-bottom-padding-mobile: 130px; --chat-open-padding-bottom: 26px; }
        * { box-sizing: border-box; font-family: 'Orbitron', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        .glass { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #222; margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; font-family: 'Orbitron', sans-serif; font-size: 14px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 900; background: var(--p); color: #000; cursor: pointer; text-transform: uppercase; font-family: 'Orbitron', sans-serif; transition: all 0.2s; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(7, 255, 255, 0.5); }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .header { padding: 15px 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #111; align-items: center; background: #000; z-index: 40; }
        .av { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--p); object-fit: cover; background: #1a1a1a; cursor: pointer; transition: 0.2s; }
        .av:hover { transform: scale(1.1); box-shadow: 0 0 10px rgba(7, 255, 255, 0.7); }

        .view { flex: 1; padding: 15px; display: none; overflow-y: auto; padding-bottom: var(--view-bottom-padding); }
        .view.active { display: block; animation: slideIn 0.4s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .r-wrap { position: relative; width: 250px; height: 250px; margin: 20px auto; display:flex; align-items:center; justify-content:center; }
        .r-box { width: 100%; height: 100%; border-radius: 50%; border: 6px solid var(--gold); box-shadow: 0 0 30px rgba(255, 204, 0, 0.3); will-change: transform; transform: rotate(0deg); }
        .roulette-pointer { position:absolute; top:-10px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:14px solid transparent; border-right:14px solid transparent; border-top:28px solid var(--gold); filter: drop-shadow(0 0 10px rgba(255, 204, 0, 0.7)); z-index:3; }
        .roulette-pointer::after { content:''; position:absolute; left:-5px; top:-31px; width:10px; height:10px; border-radius:50%; background:var(--gold); box-shadow:0 0 12px rgba(255, 204, 0, 0.7); }
        .roulette-center { position:absolute; width:26px; height:26px; border-radius:50%; background:radial-gradient(circle, #fff 0%, var(--gold) 45%, #6d5200 100%); border:2px solid rgba(0,0,0,0.35); z-index:2; pointer-events:none; }

        .ttt { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; max-width: 210px; margin: 15px auto; }
        .c { aspect-ratio: 1; background: #000; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; border-radius: 8px; cursor: pointer; }
        .c:hover { border-color: var(--p); transform: scale(1.05); box-shadow: 0 0 10px rgba(7, 255, 255, 0.3); }

        nav { position: fixed; bottom: 0; width: 100%; display: grid; grid-template-columns: repeat(5, 1fr); background: #000; border-top: 1px solid #111; padding: 10px 0 var(--app-nav-safe-bottom); z-index: 50; box-shadow: 0 -8px 20px rgba(0, 0, 0, 0.6); }
        .tab { text-align: center; color: #444; font-size: 22px; cursor: pointer; transition: all 0.3s; }
        .tab.active { color: var(--p); animation: tabPulse 0.5s ease; }
        @keyframes tabPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        .tab span { display: block; font-size: 8px; text-transform: uppercase; margin-top: 4px; }

        .orb { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--g); margin: 30px auto; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; }
        .orb:hover { transform: scale(1.08); box-shadow: 0 0 20px rgba(0, 255, 136, 0.5); }
        .orb.on { border-color: var(--r); animation: miningPulse 1.5s infinite; background: rgba(255, 51, 102, 0.15); }

        .friend-item { background: #000; padding: 10px 12px; border-radius: 12px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; cursor:pointer; transition: all 0.2s; gap: 10px; }
        .friend-item:hover { border-color: var(--p); background: rgba(7, 255, 255, 0.05); }
        .friend-item button { width: 60px; padding: 8px; font-size: 11px; }
        .friend-item-main { display:flex; flex-direction:column; gap:2px; flex: 1; min-width: 0; }
        .friend-item-subtitle { font-size:10px; color:#666; }
        .request-actions { display:flex; gap:8px; margin-top:10px; }
        .request-actions .btn { margin:0; }
        .friend-item-identity { display:flex; align-items:center; gap:10px; min-width:0; }
        .list-avatar-wrap { width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(7, 255, 255, 0.45); overflow: hidden; flex-shrink: 0; background: #050505; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 8px rgba(7, 255, 255, 0.15); }
        .list-avatar-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .list-avatar-fallback { width: 100%; height: 100%; display:flex; align-items:center; justify-content:center; font-size: 11px; font-weight: 900; color: var(--p); background: linear-gradient(145deg, rgba(7, 255, 255, 0.14), rgba(0, 255, 136, 0.1)); }
        .chat-text { white-space: pre-wrap; word-break: break-word; overflow-wrap: anywhere; line-height: 1.45; font-size: 13px; }
        .chat-empty { color:#666; text-align:center; padding:20px 0; font-size:12px; }
        .settings-section { margin-bottom:15px; }
        .settings-label { display:block; font-size:10px; color:var(--p); margin-top:12px; }
        .secondary-btn { background:#111; color:var(--p); border:1px solid #333; }
        .danger-btn { background:var(--r); color:#fff; }
        .settings-avatar-actions { display:flex; gap:10px; margin-top:15px; }
        .settings-avatar-preview { width:72px; height:72px; border-radius:50%; border:2px solid var(--p); object-fit:cover; background:#000; display:block; margin:0 auto 10px; }
        .hidden-file-input { display:none; }

        .user-search-results { background: #000; border: 1px solid #333; border-radius: 8px; max-height: 150px; overflow-y: auto; margin-top: 10px; }
        .user-result { padding: 10px; border-bottom: 1px solid #222; display: flex; align-items: center; cursor: pointer; }
        .user-result:hover { background: rgba(7, 255, 255, 0.1); border-left: 3px solid var(--p); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 12px; border: 2px solid var(--p); max-width: 350px; width: 90%; }

        .chat-container { display: flex; flex-direction: column; height: 100%; min-height: 0; }
        #tab4-chat.chat-view-active { padding-bottom: var(--chat-open-padding-bottom); }
        .chat-messages { flex: 1; overflow-y: auto; margin-bottom: 14px; background: rgba(0, 0, 0, 0.85); border-radius: 14px; border: 1px solid #1a1a1a; padding: 12px; min-height: 150px; box-shadow: inset 0 0 18px rgba(7, 255, 255, 0.06); }
        .chat-row { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 10px; animation: slideIn 0.22s ease; }
        .chat-row.own { flex-direction: row-reverse; }
        .chat-avatar-wrap { width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(7, 255, 255, 0.5); overflow: hidden; flex-shrink: 0; background: #050505; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 8px rgba(7, 255, 255, 0.12); }
        .chat-avatar-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .chat-avatar-fallback { width: 100%; height: 100%; display:flex; align-items:center; justify-content:center; font-size: 10px; font-weight: 900; color: var(--p); background: linear-gradient(145deg, rgba(7, 255, 255, 0.16), rgba(0, 255, 136, 0.1)); }
        .chat-msg { max-width: min(82%, 430px); border-radius: 14px; padding: 9px 11px; border: 1px solid transparent; }
        .chat-row.own .chat-msg { background: rgba(7, 255, 255, 0.15); border-color: rgba(7, 255, 255, 0.25); border-bottom-right-radius: 5px; }
        .chat-row.other .chat-msg { background: rgba(0, 255, 136, 0.1); border-color: rgba(0, 255, 136, 0.2); border-bottom-left-radius: 5px; }
        .chat-meta { display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:9px; color:#90a4ae; margin-bottom:4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .chat-input-wrap { display:flex; gap:8px; position: sticky; bottom: 20px; padding: 8px; border-radius: 12px; background: linear-gradient(180deg, rgba(3, 3, 3, 0), rgba(3, 3, 3, 0.92) 42%); backdrop-filter: blur(2px); z-index: 2; }
        .chat-input-wrap .btn { margin: 0; width: 78px; }

        .internet-check { position: fixed; top: 10px; right: 10px; z-index: 999; padding: 10px 15px; border-radius: 20px; font-size: 11px; display: none; }
        .internet-check.no-connection { background: var(--r); display: block; }
        .internet-check.connected { background: var(--g); color: #000; display: block; }

        .sync-indicator { position: fixed; bottom: 80px; right: 10px; width: 12px; height: 12px; border-radius: 50%; background: #666; z-index: 45; }
        .sync-indicator.active { background: var(--g); animation: pulse 0.5s; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        .game-notification { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 15px 25px; border-radius: 12px; font-weight: 900; z-index: 90; display: none; animation: slideIn 0.3s ease; }

        .firebase-status { position: fixed; bottom: 90px; right: 80px; background: rgba(0,255,136,0.2); padding: 5px 10px; border-radius: 8px; font-size: 10px; color: var(--g); z-index: 45; border: 1px solid var(--g); }

        @media (max-width: 480px) {
            body { font-size: 14px; }
            .view { padding: 12px; padding-bottom: var(--view-bottom-padding-mobile); }
            input, select, .btn { padding: 11px; font-size: 13px; }
            .orb { width: 140px; height: 140px; font-size: 14px; }
            .chat-msg { max-width: 86%; }
            .chat-input-wrap { bottom: 24px; }
        }

        /* 🟢 Онлайн-статус */
        .online-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--g); border: 2px solid var(--card); display: inline-block; flex-shrink: 0; box-shadow: 0 0 6px rgba(0, 255, 136, 0.7); }

        /* 🔴 Лічильник непрочитаних */
        .unread-badge { background: var(--r); color: #fff; border-radius: 50%; min-width: 20px; height: 20px; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; padding: 0 3px; flex-shrink: 0; }

        /* 🔔 Бейдж на таб навігації */
        .tab-nav-badge { position: absolute; top: 3px; right: 8px; background: var(--r); color: #fff; border-radius: 50%; width: 14px; height: 14px; font-size: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; pointer-events: none; }

        /* ✏️ Анімація набору тексту */
        .typing-row { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 6px; }
        .typing-bubble { background: rgba(0, 255, 136, 0.1); border: 1px solid rgba(0, 255, 136, 0.2); border-radius: 14px; border-bottom-left-radius: 5px; padding: 10px 14px; display: flex; align-items: center; gap: 5px; }
        .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--g); opacity: 0.7; animation: typingBounce 1.2s infinite ease-in-out; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.7; } 30% { transform: translateY(-7px); opacity: 1; } }
    </style>
</head>
<body>

<!-- ІНТЕРНЕТ СТАТУС -->
<div id="internet-status" class="internet-check"></div>

<!-- FIREBASE СТАТУС -->
<div id="firebase-status" class="firebase-status" style="display:none;">🔥 FIREBASE ACTIVE</div>

<!-- ІНДИКАТОР СИНХРОНІЗАЦІЇ -->
<div id="sync-indicator" class="sync-indicator" title="Синхронізація Firebase"></div>

<!-- СПОВІЩЕННЯ -->
<div id="game-notification" class="game-notification"></div>

<!-- МОДАЛЬ ЗАПИТУ НА ГРУ -->
<div id="ttt-request-modal" style="display:none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); border: 2px solid var(--g); border-radius: 12px; padding: 20px; z-index: 100;">
    <h3 style="color:var(--g); margin-top:0;">🎮 ЗАПИТ НА ГРУ</h3>
    <div id="ttt-request-text" style="color:#fff; margin:10px 0; font-size:14px;"></div>
    <div style="display:flex; gap:10px; margin-top:15px;">
        <button class="btn" onclick="acceptGameRequest()" style="background:var(--g); color:#000;">ПРИЙНЯТИ</button>
        <button class="btn" onclick="rejectGameRequest()" style="background:var(--r); color:#fff;">ВІДХИЛИТИ</button>
    </div>
</div>

<!-- ЕКРАН ВХОДУ -->
<div id="auth-scr" style="height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div class="glass" style="width:100%; max-width:320px; text-align:center;">
        <h2 style="letter-spacing:3px; margin-bottom:30px; font-size:2rem; color:var(--gold);">BB COIN</h2>
        
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <div class="auth-tab active" onclick="switchAuth('login')" style="flex:1; padding:10px; background:var(--p); color:#000; cursor:pointer; border-radius:8px; font-weight:900;">Вхід</div>
            <div class="auth-tab" onclick="switchAuth('register')" style="flex:1; padding:10px; background:#000; color:#555; cursor:pointer; border-radius:8px; border:2px solid #333;">Реєстрація</div>
        </div>

        <div id="login-form">
            <input type="text" id="login-u" placeholder="ЛОГІН">
            <input type="password" id="login-p" placeholder="ПАРОЛЬ">
            <button class="btn" onclick="auth()">УВІЙТИ</button>
        </div>

        <div id="register-form" style="display:none;">
            <input type="text" id="reg-u" placeholder="ЛОГІН">
            <input type="password" id="reg-p" placeholder="ПАРОЛЬ">

            <button class="btn" onclick="register()">СТВОРИТИ АКАУНТ</button>
        </div>
    </div>
</div>

<!-- ГОЛОВНИЙ ЕКРАН -->
<div id="main-scr" style="display:none; flex-direction:column; height:100vh;">
    <div class="header">
        <div><small style="color:#555;">OPERATOR</small><br><b id="h-u">---</b></div>

        <img id="h-a" class="av" src="https://api.dicebear.com/7.x/avataaars/svg?seed=default" alt="avatar" onclick="openAvatarModal()">
    </div>

    <!-- ВКЛ.1: МАЙНИНГ -->
    <div id="tab1" class="view active" style="display:block;">
        <h1 id="v-bal" style="text-align:center; font-size:3.5rem; margin:30px 0; font-weight:900;">0.0000</h1>
        <div id="mbtn" class="orb" onclick="toggleMine()">START<br>MINING</div>
        <div style="text-align:center; font-size:12px; color:#555;">+0.0001 BB/сек</div>
    </div>

    <!-- ВКЛ.2: ПЕРЕДАЧА -->
    <div id="tab2" class="view">
        <h3 style="color:var(--p); margin-top:0;">TRANSFER BB COIN</h3>
        <div class="glass">
            <label style="font-size:10px; color:var(--p);">ЛОГІН ОТРИМУВАЧА</label>

    <!-- ВКЛ.3: КАЗИНО -->
    <div id="tab3" class="view">

    <!-- ВКЛ.5: НАЛАШТУВАННЯ -->
    <div id="tab5" class="view">
        <h3>⚙️ НАЛАШТУВАННЯ</h3>
        <div class="glass settings-section">
            <img id="settings-avatar-preview" class="settings-avatar-preview" src="https://api.dicebear.com/7.x/avataaars/svg?seed=default" alt="User profile avatar preview">

<!-- FIREBASE SYNC MODULE -->
<script src="firebase-sync.js"></script>

<script>
    const avatarGallery = [
        'https://api.dicebear.com/7.x/avataaars/svg?seed=user1',
        'https://api.dicebear.com/7.x/avataaars/svg?seed=user2',
        'https://api.dicebear.com/7.x/avataaars/svg?seed=user3',
        'https://api.dicebear.com/7.x/avataaars/svg?seed=user4',
        'https://api.dicebear.com/7.x/avataaars/svg?seed=user5',
        'https://api.dicebear.com/7.x/avataaars/svg?seed=user6',
    ];
    const rouletteColorMeta = {
        red: { hex: '#ff3366', emoji: '🔴' },
        green: { hex: '#00ff88', emoji: '🟢' },
        black: { hex: '#1a1a1a', emoji: '⚫' }
    };
    const rouletteSegmentColors = ['green', 'red', 'black', 'red', 'black', 'red', 'black', 'red', 'black', 'red', 'black', 'red', 'black', 'red', 'black'];
    const rouletteSegments = rouletteSegmentColors.map((segmentColor, index) => {
        const segmentAngle = 360 / rouletteSegmentColors.length;
        return {
            color: segmentColor,
            start: index * segmentAngle,
            end: (index + 1) * segmentAngle
        };
    });
    const roulettePayouts = { red: 2, black: 2, green: 14 };
    const rouletteSpinDuration = 5600;
    const roulettePointerPadding = 2;
    const rouletteMinSegmentRange = 0.1;
    const rouletteMinFullTurns = 6;
    const rouletteExtraFullTurnsRange = 3;
    const chatPollingIntervalMs = 2500;
    const chatSignatureTextPreviewLength = 48;
    const maxDisplayNameLength = 24;
    const minPasswordLength = 4;
    const maxAvatarFileSize = 2 * 1024 * 1024;
    const maxAvatarFileSizeMB = maxAvatarFileSize / (1024 * 1024);

    let allUsers = {};
    let mineInterval = null;
    let pendingGameRequest = null;
    let typingTimeout = null;
    const chatRealtimeBridge = {
        timer: null,
        activeChatFriend: null
    };

    let gameState = {
        user: null,
        displayName: null,
        avatar: avatarGallery[0],
        balance: 0,
        mining: false,
        friends: [],
        friendRequests: [],
        privateChatMessages: {},
        chatMessageSignatures: {},
        gameInvitations: {},
        currentChatFriend: null,
        miningStartTime: 0,
        expandedFriendRequest: null,
        rouletteRotation: 0,
        rouletteSpinning: false,
        unreadCounts: {},
        friendsOnline: {}
    };

    // ===== ІНІЦІАЛІЗАЦІЯ =====
    document.addEventListener('DOMContentLoaded', () => {
        // Ініціалізувати Firebase
        initFirebaseSync();
        renderRouletteWheel();
        document.getElementById('avatar-file-input').addEventListener('change', handleAvatarFileChange);
    });

    function escapeHtml(value) {
        return String(value ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function normalizeAngle(angle) {
        return ((angle % 360) + 360) % 360;
    }

    function getRouletteGradient() {
        return `conic-gradient(from -90deg, ${rouletteSegments.map(segment =>
            `${rouletteColorMeta[segment.color].hex} ${segment.start}deg ${segment.end}deg`
        ).join(', ')})`;
    }

    function renderRouletteWheel() {
        const wheel = document.getElementById('wheel');
        if (!wheel) return;
        wheel.style.background = getRouletteGradient();
        wheel.style.transform = `rotate(${gameState.rouletteRotation}deg)`;
    }

    function getRouletteSegmentByWheelAngle(angle) {
        const normalized = normalizeAngle(angle);
        return rouletteSegments.find(segment => normalized >= segment.start && normalized < segment.end) || rouletteSegments[rouletteSegments.length - 1];
    }

    function getWheelAngleUnderPointer(rotation) {
        return normalizeAngle(360 - normalizeAngle(rotation));
    }

    function getRouletteResultForRotation(rotation) {
        return getRouletteSegmentByWheelAngle(getWheelAngleUnderPointer(rotation));
    }

    function pickRouletteSegment() {
        return rouletteSegments[Math.floor(Math.random() * rouletteSegments.length)];
    }

    function getRandomStopAngleForSegment(segment) {
        const safeStart = segment.start + roulettePointerPadding;
        const safeEnd = segment.end - roulettePointerPadding;
        return safeStart + (Math.random() * Math.max(safeEnd - safeStart, rouletteMinSegmentRange));
    }

    function formatUserLabel(username) {
        const userData = allUsers[username] || {};
        const displayName = (userData.displayName || username || '').trim();
        return displayName !== username ? `${displayName} (@${username})` : username;
    }

    function sanitizeAvatarUrl(url) {
        if (typeof url !== 'string') return '';
        const value = url.trim();
        if (!value) return '';
        if (value.startsWith('data:image/')) return value;
        if (/^https?:\/\//i.test(value)) return value;
        return '';
    }

    function getUserInitials(username) {
        const label = formatUserLabel(username).replace(/\(.*\)/, '').trim();
        const parts = label.split(/\s+/).filter(Boolean);
        if (parts.length >= 2) {
            return parts.slice(0, 2).map(part => part[0] || '').join('').toUpperCase() || '?';
        }
        return (label.slice(0, 2) || '?').toUpperCase();
    }

    function getUserAvatarUrl(username) {
        return sanitizeAvatarUrl((allUsers[username] || {}).avatar || '');
    }

    function getAvatarImageHtml(avatar, alt) {
        if (!avatar) return '';
        return `<img class="avatar-img" src="${escapeHtml(avatar)}" alt="${alt}">`;
    }

    function buildListAvatarHtml(username) {
        const avatar = getUserAvatarUrl(username);
        const initials = escapeHtml(getUserInitials(username));
        const alt = escapeHtml(formatUserLabel(username));
        return `
            <span class="list-avatar-wrap">
                ${getAvatarImageHtml(avatar, alt)}
                <span class="list-avatar-fallback" style="${avatar ? 'display:none;' : 'display:flex;'}">${initials}</span>
            </span>
        `;
    }

    function buildChatAvatarHtml(username) {
        const avatar = getUserAvatarUrl(username);
        const initials = escapeHtml(getUserInitials(username));
        const alt = escapeHtml(formatUserLabel(username));
        return `
            <span class="chat-avatar-wrap">
                ${getAvatarImageHtml(avatar, alt)}
                <span class="chat-avatar-fallback" style="${avatar ? 'display:none;' : 'display:flex;'}">${initials}</span>
            </span>
        `;
    }

    function normalizeChatMessages(rawMessages) {
        if (!rawMessages) return [];
        const list = Array.isArray(rawMessages) ? rawMessages : Object.values(rawMessages);
        return list
            .filter(item => item && typeof item.text === 'string')
            .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
    }

    function getChatMessagesSignature(messages) {
        const last = messages[messages.length - 1];
        const lastPreview = (last?.text || '').slice(0, chatSignatureTextPreviewLength);
        const lastStamp = last ? `${last.timestamp || 0}:${last.from || ''}:${lastPreview}` : 'none';
        return `${messages.length}|${lastStamp}`;
    }

    function applyIncomingChatMessages(friendUsername, rawMessages) {
        const normalized = normalizeChatMessages(rawMessages);
        const signature = getChatMessagesSignature(normalized);
        if (gameState.chatMessageSignatures[friendUsername] === signature) {
            return false;
        }
        const prevCount = (gameState.privateChatMessages[friendUsername] || []).length;
        gameState.privateChatMessages[friendUsername] = normalized;
        gameState.chatMessageSignatures[friendUsername] = signature;

        // Track unread incoming messages when chat is not open
        if (gameState.currentChatFriend !== friendUsername) {
            const newMsgs = normalized.slice(prevCount);
            const unreadFromFriend = newMsgs.filter(m => m.from !== gameState.user).length;
            if (unreadFromFriend > 0) {
                gameState.unreadCounts[friendUsername] = (gameState.unreadCounts[friendUsername] || 0) + unreadFromFriend;
                updateFriendsList();
                updateChatTabBadge();
            }
        }

        if (gameState.currentChatFriend === friendUsername) {
            displayPrivateChat();
        }
        return true;
    }

    function formatChatTimestamp(timestamp) {
        if (!timestamp) return '--:--';
        const parsed = new Date(Number(timestamp));
        if (Number.isNaN(parsed.getTime())) return '--:--';
        return parsed.toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit' });
    }

    async function refreshChatByPolling(currentUser, friendUsername) {
        if (!currentUser || !friendUsername || typeof loadChatMessagesFirebase !== 'function') return;
        try {
            const messages = await loadChatMessagesFirebase(currentUser, friendUsername);
            applyIncomingChatMessages(friendUsername, messages);
        } catch (error) {
            console.warn(`⚠️ Помилка polling чату (${currentUser} -> ${friendUsername}):`, error);
        }
    }

    function stopChatRealtimeBridge() {
        if (chatRealtimeBridge.timer) {
            clearInterval(chatRealtimeBridge.timer);
            chatRealtimeBridge.timer = null;
        }
        chatRealtimeBridge.activeChatFriend = null;
    }

    function startChatRealtimeBridge(currentUser, friendUsername) {
        stopChatRealtimeBridge();
        chatRealtimeBridge.activeChatFriend = friendUsername;
        refreshChatByPolling(currentUser, friendUsername);
        chatRealtimeBridge.timer = setInterval(() => {
            // Перевіряємо і стан bridge, і поточний відкритий чат, щоб interval не працював для неактивного діалогу.
            if (chatRealtimeBridge.activeChatFriend !== friendUsername || gameState.currentChatFriend !== friendUsername) {
                stopChatRealtimeBridge();
                return;
            }
            refreshChatByPolling(currentUser, friendUsername);
        }, chatPollingIntervalMs);
    }

    function attachAvatarFallbackHandlers(scopeElement) {
        if (!scopeElement) return;
        scopeElement.querySelectorAll('img.avatar-img').forEach((image) => {
            if (image.dataset.fallbackBound === '1') return;
            image.dataset.fallbackBound = '1';
            image.addEventListener('error', () => {
                image.style.display = 'none';
                if (image.nextElementSibling) {
                    image.nextElementSibling.style.display = 'flex';
                }
            });
        });
    }

    window.stickChatRealtime = window.stickChatRealtime || {};
    window.stickChatRealtime.handleSnapshot = (friendUsername, rawMessages) => {
        applyIncomingChatMessages(friendUsername, rawMessages);
    };

    function updateCachedUser(username, updates) {
        allUsers[username] = {
            ...(allUsers[username] || {}),
            ...updates
        };
    }

    function refreshSettingsForm() {
        if (!gameState.user) return;
        document.getElementById('settings-display-name').value = gameState.displayName || gameState.user;
        document.getElementById('settings-avatar-preview').src = gameState.avatar || avatarGallery[0];
    }

    window.__stickAppDebug = {
        getRouletteSegments: () => rouletteSegments.map(segment => ({ ...segment })),
        normalizeAngle,
        getWheelAngleUnderPointer,
        getRouletteResultForRotation
    };

    // ===== АУТЕНТИФІКАЦІЯ =====
    function switchAuth(type) {
        document.getElementById('login-form').style.display = type === 'login' ? 'block' : 'none';
        document.getElementById('register-form').style.display = type === 'register' ? 'block' : 'none';
    }

    async function register() {
        const username = document.getElementById('reg-u').value.trim();
        const password = document.getElementById('reg-p').value;
        const passwordConfirm = document.getElementById('reg-p2').value;

        if (!username || !password || !passwordConfirm) {
            alert('Заповніть всі поля!');
            return;
        }
        if (password !== passwordConfirm) {
            alert('Паролі не співпадають!');
            return;
        }

        const userData = {
            username: username,
            displayName: username,
            password: password,
            balance: 0,
            avatar: avatarGallery[Math.floor(Math.random() * avatarGallery.length)],
            friends: [],
            friendRequests: [],
            privateChatMessages: {},
            gameInvitations: {},
            mining: false,
            miningStartTime: 0,
            createdAt: new Date().toISOString()
        };

        await saveUserToFirebase(username, userData);
        alert('Акаунт створено! 🎉');
        document.getElementById('reg-u').value = '';
        document.getElementById('reg-p').value = '';
        document.getElementById('reg-p2').value = '';
        switchAuth('login');
    }

    async function auth() {
        const username = document.getElementById('login-u').value.trim();
        const password = document.getElementById('login-p').value;

        if (!username || !password) {
            alert('Заповніть все!');
            return;
        }

        const userData = await loadUserFromFirebase(username);
        
        if (!userData) {
            alert('Користувача не знайдено!');
            return;
        }
        if (userData.password !== password) {
            alert('Неправильний пароль!');
            return;
        }

        gameState.user = username;
        gameState.displayName = userData.displayName || username;
        gameState.avatar = userData.avatar || avatarGallery[0];
        gameState.balance = userData.balance || 0;
        gameState.friends = userData.friends || [];
        gameState.friendRequests = userData.friendRequests || [];
        gameState.privateChatMessages = {};
        gameState.chatMessageSignatures = {};
        gameState.currentChatFriend = null;
        gameState.expandedFriendRequest = null;

        // Показати основний екран
        document.getElementById('auth-scr').style.display = 'none';
        document.getElementById('main-scr').style.display = 'flex';

        // Налаштувати слухачі FIREBASE
        setupAllListenersOnLogin(username);
        
        updateHeader();

        // Завантажити всіх користувачів
        allUsers = await loadAllUsersFromFirebase();
        updateCachedUser(username, userData);
        refreshSettingsForm();
        updateFriendRequestsList();
        updateFriendsList();
    }

    function updateHeader() {
        document.getElementById('h-u').textContent = gameState.displayName || gameState.user || '---';
        document.getElementById('h-b').textContent = gameState.balance.toFixed(4);
        document.getElementById('v-bal').textContent = gameState.balance.toFixed(4);
        document.getElementById('h-a').src = gameState.avatar || avatarGallery[0];
        document.getElementById('settings-avatar-preview').src = gameState.avatar || avatarGallery[0];
    }

    function updateSyncIndicator(isSynced) {
        const indicator = document.getElementById('sync-indicator');
        if (isSynced) {
            indicator.classList.add('active');
            setTimeout(() => indicator.classList.remove('active'), 500);
        }
    }

    function updateChatTabBadge() {
        const total = Object.values(gameState.unreadCounts).reduce((s, n) => s + (n || 0), 0);
        const tab = document.getElementById('friends-nav-tab');
        if (!tab) return;
        let badge = tab.querySelector('.tab-nav-badge');
        if (total > 0) {
            if (!badge) {
                badge = document.createElement('div');
                badge.className = 'tab-nav-badge';
                tab.appendChild(badge);
            }
            badge.textContent = total > 9 ? '9+' : String(total);
            badge.style.display = 'flex';
        } else if (badge) {
            badge.style.display = 'none';
        }
    }

    function updateChatOnlineDot(isOnline) {
        const dot = document.getElementById('chat-online-dot');
        if (dot) dot.style.display = isOnline ? 'inline-block' : 'none';
    }

    function showGameNotification(message) {
        const notif = document.getElementById('game-notification');
        notif.textContent = message;
        notif.style.display = 'block';
        setTimeout(() => {
            notif.style.display = 'none';
        }, 4000);
    }

    // ===== ТАБУЛЯЦІЯ =====
    function switchTab(tabNum) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.querySelectorAll('nav .tab').forEach(t => t.classList.remove('active'));
        
        const tabMap = {1: 'tab1', 2: 'tab2', 3: 'tab3', 4: 'tab4', 5: 'tab5'};
        document.getElementById(tabMap[tabNum]).style.display = 'block';
        document.querySelectorAll('nav .tab')[tabNum - 1].classList.add('active');
        if (tabNum === 4) {
            updateFriendRequestsList();
            updateFriendsList();
        }
        if (tabNum === 5) {
            refreshSettingsForm();
        }
    }

    // ===== МАЙНИНГ =====
    function toggleMine() {
        const btn = document.getElementById('mbtn');
        gameState.mining = !gameState.mining;
        
        if (gameState.mining) {
            btn.classList.add('on');
            btn.textContent = 'MINING...';
            gameState.miningStartTime = Date.now();
            
            mineInterval = setInterval(() => {
                if (!gameState.mining) {
                    clearInterval(mineInterval);
                    return;
                }
                gameState.balance += 0.0001;
                updateHeader();
                
                // Оновити Firebase кожні 5 секунд
                if (Math.floor((Date.now() - gameState.miningStartTime) / 5000) % 1 === 0) {
                    updateMiningBalanceFirebase(gameState.user, gameState.balance);
                }
            }, 1000);
        } else {
            btn.classList.remove('on');
            btn.textContent = 'START\nMINING';
            clearInterval(mineInterval);
            
            // Фінальне оновлення
            updateMiningBalanceFirebase(gameState.user, gameState.balance);
        }
    }

    // ===== ПЕРЕДАЧА МОНЕТ =====
    function searchTransferUser() {
        const input = document.getElementById('transfer-user').value.trim();
        const resultsDiv = document.getElementById('transfer-search-results');
        
        if (!input) {
            resultsDiv.style.display = 'none';
            return;
        }

        const results = Object.keys(allUsers).filter(u => 
            u.toLowerCase().includes(input.toLowerCase()) && u !== gameState.user
        );

        resultsDiv.innerHTML = results.map(user => `
            <div class="user-result" onclick="selectTransferUser('${user}')">
                <div style="flex:1;">${user}</div>
            </div>
        `).join('');
        resultsDiv.style.display = results.length > 0 ? 'block' : 'none';
    }

    function selectTransferUser(username) {
        document.getElementById('transfer-user').value = username;
        document.getElementById('transfer-search-results').style.display = 'none';
    }

    async function transferCoins() {
        const recipient = document.getElementById('transfer-user').value.trim();
        const amount = parseFloat(document.getElementById('transfer-amount').value);

        if (!recipient || !amount || amount <= 0) {
            alert('Введіть коректні дані!');
            return;
        }

        if (amount > gameState.balance) {
            alert('Недостатньо коштів!');
            return;
        }

        const success = await transferCoinsFirebase(gameState.user, recipient, amount);
        
        if (success) {
            gameState.balance -= amount;
            updateHeader();
            showGameNotification(`💳 Передано ${amount.toFixed(4)} BB`);
            document.getElementById('transfer-user').value = '';
            document.getElementById('transfer-amount').value = '';
        }
    }

    // ===== РУЛЕТКА =====
    function spin(color) {
        if (gameState.rouletteSpinning) {
            return;
        }

        const amount = parseFloat(document.getElementById('bet-amt').value);
        if (!amount || amount <= 0) {
            alert('Введіть ставку!');
            return;
        }
        if (amount > gameState.balance) {
            alert('Недостатньо коштів!');
            return;
        }

        const wheel = document.getElementById('wheel');
        const winningSegment = pickRouletteSegment();
        const stopWheelAngle = getRandomStopAngleForSegment(winningSegment);
        const finalRotationNormalized = normalizeAngle(360 - stopWheelAngle);
        const currentRotationNormalized = normalizeAngle(gameState.rouletteRotation);
        const deltaRotation = normalizeAngle(finalRotationNormalized - currentRotationNormalized);
        const fullTurns = rouletteMinFullTurns + Math.floor(Math.random() * rouletteExtraFullTurnsRange);
        const targetRotation = gameState.rouletteRotation + (fullTurns * 360) + deltaRotation;

        gameState.rouletteSpinning = true;
        wheel.style.transition = 'none';
        wheel.style.transform = `rotate(${gameState.rouletteRotation}deg)`;

        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                wheel.style.transition = `transform ${rouletteSpinDuration}ms cubic-bezier(0.12, 0.82, 0.18, 1)`;
                wheel.style.transform = `rotate(${targetRotation}deg)`;
            });
        });

        setTimeout(async () => {
            gameState.rouletteRotation = normalizeAngle(targetRotation);
            wheel.style.transition = 'none';
            wheel.style.transform = `rotate(${gameState.rouletteRotation}deg)`;
            gameState.rouletteSpinning = false;

            const resultSegment = getRouletteResultForRotation(gameState.rouletteRotation);
            const isWin = resultSegment.color === color;
            const multiplier = roulettePayouts[resultSegment.color];
            const resultEmoji = rouletteColorMeta[resultSegment.color].emoji;

            if (isWin) {
                gameState.balance += amount * multiplier;
                showGameNotification(`🎯 ${resultEmoji} ${resultSegment.color.toUpperCase()} — ВИГРАШ +${(amount * multiplier).toFixed(4)}`);
            } else {
                gameState.balance -= amount;
                showGameNotification(`🎯 ${resultEmoji} ${resultSegment.color.toUpperCase()} — ПРОГРАШ -${amount.toFixed(4)}`);
            }

            document.getElementById('bet-amt').value = '';
            updateHeader();
            await updateMiningBalanceFirebase(gameState.user, gameState.balance);
        }, rouletteSpinDuration);
    }

    // ===== ДРУЗІ =====
    function searchFriendUser() {
        const input = document.getElementById('f-u').value.trim();
        const resultsDiv = document.getElementById('friend-search-results');
        
        if (!input) {
            resultsDiv.style.display = 'none';
            return;
        }

        const results = Object.keys(allUsers).filter(u => 
            u.toLowerCase().includes(input.toLowerCase()) && 
            u !== gameState.user && 
            !gameState.friends.includes(u)
        );
        resultsDiv.innerHTML = '';
        results.forEach(user => {
            const item = document.createElement('div');
            item.className = 'user-result';
            item.textContent = formatUserLabel(user);
            item.addEventListener('click', () => selectFriendToAdd(user));
            resultsDiv.appendChild(item);
        });
        resultsDiv.style.display = results.length > 0 ? 'block' : 'none';
    }

    function selectFriendToAdd(username) {
        document.getElementById('f-u').value = username;
        document.getElementById('friend-search-results').style.display = 'none';
    }

    async function sendFriendRequest() {
        const username = document.getElementById('f-u').value.trim();
        if (!username) {
            alert('Виберіть користувача!');
            return;
        }
        if (username === gameState.user) {
            alert('Не можна додати себе!');
            return;
        }

        const success = await sendFriendRequestFirebase(gameState.user, username);
        if (!success) {
            alert('Не вдалося надіслати запит або він уже існує');
            return;
        }

        showGameNotification(`📬 Запит відправлено ${username}`);
        document.getElementById('f-u').value = '';
    }

    function updateFriendRequestsList() {
        const container = document.getElementById('f-requests');
        if (gameState.friendRequests.length === 0) {
            container.innerHTML = '<div class="chat-empty">Немає нових запитів</div>';
            return;
        }

        container.innerHTML = '';
        gameState.friendRequests.forEach(requester => {
            const card = document.createElement('div');
            card.className = 'friend-item';
            card.setAttribute('role', 'button');
            card.setAttribute('tabindex', '0');

            const expanded = gameState.expandedFriendRequest === requester;
            card.innerHTML = `
                <div class="friend-item-identity">
                    ${buildListAvatarHtml(requester)}
                    <div class="friend-item-main">
                        <strong>${escapeHtml(formatUserLabel(requester))}</strong>
                        <span class="friend-item-subtitle">${expanded ? 'Оберіть дію для запиту' : 'Натисніть, щоб відкрити дії'}</span>
                    </div>
                </div>
            `;

            card.addEventListener('click', () => toggleFriendRequestActions(requester));
            card.addEventListener('keypress', (event) => {
                if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    toggleFriendRequestActions(requester);
                }
            });

            if (expanded) {
                const actions = document.createElement('div');
                actions.className = 'request-actions';

                const acceptButton = document.createElement('button');
                acceptButton.className = 'btn';
                acceptButton.style.background = 'var(--g)';
                acceptButton.style.color = '#000';
                acceptButton.textContent = 'ПРИЙНЯТИ';
                acceptButton.addEventListener('click', async (event) => {
                    event.stopPropagation();
                    await acceptFriendRequest(requester);
                });

                const rejectButton = document.createElement('button');
                rejectButton.className = 'btn danger-btn';
                rejectButton.textContent = 'ВІДХИЛИТИ';
                rejectButton.addEventListener('click', async (event) => {
                    event.stopPropagation();
                    await rejectFriendRequest(requester);
                });

                actions.appendChild(acceptButton);
                actions.appendChild(rejectButton);
                card.appendChild(actions);
            }

            container.appendChild(card);
        });
        attachAvatarFallbackHandlers(container);
    }

    function updateFriendsList() {
        const container = document.getElementById('f-list');
        if (gameState.friends.length === 0) {
            container.innerHTML = '<div class="chat-empty">Список друзів порожній</div>';
            return;
        }

        container.innerHTML = '';
        gameState.friends.forEach(friend => {
            const item = document.createElement('div');
            item.className = 'friend-item';
            item.setAttribute('role', 'button');
            item.setAttribute('tabindex', '0');
            const isOnline = gameState.friendsOnline[friend] === true;
            const unread = gameState.unreadCounts[friend] || 0;
            item.innerHTML = `
                <div class="friend-item-identity">
                    ${buildListAvatarHtml(friend)}
                    <div class="friend-item-main">
                        <div style="display:flex; align-items:center; gap:6px;">
                            <strong>${escapeHtml(formatUserLabel(friend))}</strong>
                            ${isOnline ? '<span class="online-dot" title="Онлайн"></span>' : ''}
                        </div>
                        <span class="friend-item-subtitle">Натисніть, щоб відкрити чат</span>
                    </div>
                </div>
                ${unread > 0
                    ? `<span class="unread-badge" aria-label="${unread} непрочитаних">${unread > 9 ? '9+' : unread}</span>`
                    : '<span aria-hidden="true">💬</span>'}
            `;
            item.addEventListener('click', () => openChat(friend));
            item.addEventListener('keypress', (event) => {
                if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    openChat(friend);
                }
            });
            container.appendChild(item);
        });
        attachAvatarFallbackHandlers(container);
    }

    function openChat(friendUsername) {
        // Clear unread count for this friend
        gameState.unreadCounts[friendUsername] = 0;
        updateChatTabBadge();

        gameState.currentChatFriend = friendUsername;
        startChatRealtimeBridge(gameState.user, friendUsername);
        setupChatListener(gameState.user, friendUsername);
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        const chatView = document.getElementById('tab4-chat');
        chatView.style.display = 'block';
        chatView.classList.add('chat-view-active');
        document.getElementById('chat-friend-name').textContent = formatUserLabel(friendUsername);
        const nav = document.querySelector('nav');
        if (nav) nav.style.display = 'none';

        // Show online status in chat header
        updateChatOnlineDot(gameState.friendsOnline[friendUsername] === true);

        // Hide typing indicator when opening chat
        const typingEl = document.getElementById('typing-indicator');
        if (typingEl) typingEl.style.display = 'none';

        // Setup typing listener for this friend
        if (typeof setupTypingListener === 'function') {
            setupTypingListener(gameState.user, friendUsername, (isTyping) => {
                const el = document.getElementById('typing-indicator');
                if (el) el.style.display = isTyping ? 'block' : 'none';
            });
        }

        displayPrivateChat();
    }

    function backToFriendsList() {
        // Clear typing indicator and listener
        if (gameState.currentChatFriend && gameState.user) {
            if (typeof clearTypingIndicator === 'function') {
                clearTypingIndicator(gameState.user, gameState.currentChatFriend);
            }
            if (typeof removeTypingListener === 'function') {
                removeTypingListener(gameState.user, gameState.currentChatFriend);
            }
        }
        clearTimeout(typingTimeout);
        typingTimeout = null;

        stopChatRealtimeBridge();
        gameState.currentChatFriend = null;
        document.getElementById('private-msg-in').value = '';
        const nav = document.querySelector('nav');
        if (nav) nav.style.display = '';
        document.getElementById('tab4-chat').classList.remove('chat-view-active');
        switchTab(4);
    }

    function displayPrivateChat() {
        const container = document.getElementById('private-chat-messages');
        const raw = gameState.privateChatMessages[gameState.currentChatFriend];
        const messages = normalizeChatMessages(raw);

        if (messages.length === 0) {
            container.innerHTML = '<div class="chat-empty">Напишіть перше повідомлення</div>';
            return;
        }

        container.innerHTML = messages.map(msg => `
            <div class="chat-row ${msg.from === gameState.user ? 'own' : 'other'}">
                ${buildChatAvatarHtml(msg.from)}
                <div class="chat-msg">
                    <div class="chat-meta">
                        <span>${escapeHtml(formatUserLabel(msg.from))}</span>
                        <span>${escapeHtml(formatChatTimestamp(msg.timestamp))}</span>
                    </div>
                    <div class="chat-text">${escapeHtml(msg.text)}</div>
                </div>
            </div>
        `).join('');
        attachAvatarFallbackHandlers(container);

        container.scrollTop = container.scrollHeight;
    }

    function handlePrivateChatKeypress(event) {
        if (event.key === 'Enter') {
            sendPrivateMsg();
        }
    }

    function handleChatInput() {
        if (!gameState.currentChatFriend || !gameState.user) return;
        if (typeof sendTypingIndicator === 'function') {
            sendTypingIndicator(gameState.user, gameState.currentChatFriend);
        }
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            if (gameState.currentChatFriend && gameState.user && typeof clearTypingIndicator === 'function') {
                clearTypingIndicator(gameState.user, gameState.currentChatFriend);
            }
        }, 3000);
    }

    async function sendPrivateMsg() {
        const input = document.getElementById('private-msg-in');
        const message = input.value.trim();

        if (!message || !gameState.currentChatFriend) return;

        // Clear typing on send
        clearTimeout(typingTimeout);
        typingTimeout = null;
        if (typeof clearTypingIndicator === 'function') {
            clearTypingIndicator(gameState.user, gameState.currentChatFriend);
        }

        const success = await sendPrivateMessageFirebase(gameState.user, gameState.currentChatFriend, message);
        if (!success) {
            alert('Не вдалося надіслати повідомлення');
            return;
        }

        input.value = '';
    }

    function toggleFriendRequestActions(requester) {
        gameState.expandedFriendRequest = gameState.expandedFriendRequest === requester ? null : requester;
        updateFriendRequestsList();
    }

    async function acceptFriendRequest(requester) {
        const success = await acceptFriendRequestFirebase(gameState.user, requester);
        if (!success) {
            alert('Не вдалося прийняти запит');
            return;
        }

        gameState.friendRequests = gameState.friendRequests.filter(name => name !== requester);
        gameState.friends = [...new Set([...gameState.friends, requester])];
        gameState.expandedFriendRequest = null;
        const requesterFriends = [...new Set([...(allUsers[requester]?.friends || []), gameState.user])];
        updateCachedUser(gameState.user, { friends: gameState.friends, friendRequests: gameState.friendRequests });
        updateCachedUser(requester, { friends: requesterFriends });

        // Set up online listener for the new friend
        if (typeof setupFriendOnlineListener === 'function') {
            setupFriendOnlineListener(requester, (friendName, isOnline) => {
                gameState.friendsOnline[friendName] = isOnline;
                updateFriendsList();
                if (gameState.currentChatFriend === friendName) {
                    updateChatOnlineDot(isOnline);
                }
            });
        }
        // Set up chat listener for the new friend
        if (typeof setupChatListener === 'function') {
            setupChatListener(gameState.user, requester);
        }

        updateFriendRequestsList();
        updateFriendsList();
        showGameNotification(`✅ ${formatUserLabel(requester)} додано в друзі`);
    }

    async function rejectFriendRequest(requester) {
        const success = await rejectFriendRequestFirebase(gameState.user, requester);
        if (!success) {
            alert('Не вдалося відхилити запит');
            return;
        }

        gameState.friendRequests = gameState.friendRequests.filter(name => name !== requester);
        gameState.expandedFriendRequest = null;
        updateCachedUser(gameState.user, { friendRequests: gameState.friendRequests });
        updateFriendRequestsList();
        showGameNotification(`❌ Запит від ${formatUserLabel(requester)} відхилено`);
    }

    function acceptGameRequest() {
        document.getElementById('ttt-request-modal').style.display = 'none';
        showGameNotification(`✅ Запит прийнято!`);
        pendingGameRequest = null;
    }

    function rejectGameRequest() {
        document.getElementById('ttt-request-modal').style.display = 'none';
        showGameNotification(`❌ Запит відхилено`);
        pendingGameRequest = null;
    }

    function openAvatarModal() {
        const modal = document.getElementById('avatar-modal');
        const gallery = document.getElementById('avatar-gallery');
        gallery.innerHTML = '';
        avatarGallery.forEach(avatar => {
            const image = document.createElement('img');
            image.src = avatar;
            image.alt = 'avatar';
            image.style.width = '60px';
            image.style.height = '60px';
            image.style.borderRadius = '50%';
            image.style.cursor = 'pointer';
            image.style.border = '2px solid #333';
            image.style.transition = 'all 0.2s';
            image.title = 'Select';
            image.addEventListener('click', () => selectAvatar(avatar));
            gallery.appendChild(image);
        });
        document.getElementById('avatar-file-input').value = '';
        modal.classList.add('active');
    }

    async function selectAvatar(avatar) {
        const success = await updateUserProfileFirebase(gameState.user, { avatar });
        if (!success) {
            alert('Не вдалося зберегти аватар');
            return;
        }

        gameState.avatar = avatar;
        updateCachedUser(gameState.user, { avatar });
        updateHeader();
        closeAvatarModal();
        showGameNotification('🖼️ Аватар оновлено');
    }

    async function handleAvatarFileChange(event) {
        const [file] = event.target.files || [];
        if (!file) return;
        if (!file.type.startsWith('image/')) {
            alert('Оберіть файл зображення');
            event.target.value = '';
            return;
        }
        if (file.size > maxAvatarFileSize) {
            alert(`Зображення має бути менше ${maxAvatarFileSizeMB} MB`);
            event.target.value = '';
            return;
        }

        const reader = new FileReader();
        reader.onload = async () => {
            const avatar = reader.result;
            const success = await updateUserProfileFirebase(gameState.user, { avatar });
            if (!success) {
                alert('Не вдалося зберегти аватар');
                event.target.value = '';
                return;
            }

            gameState.avatar = avatar;
            updateCachedUser(gameState.user, { avatar });
            updateHeader();
            closeAvatarModal();
            showGameNotification('🖼️ Аватар із галереї збережено');
            event.target.value = '';
        };
        reader.readAsDataURL(file);
    }

    async function saveDisplayName() {
        const displayNameInput = document.getElementById('settings-display-name');
        const nextDisplayName = displayNameInput.value.trim();

        if (!nextDisplayName) {
            alert('Введіть імʼя');
            return;
        }
        if (nextDisplayName.length > maxDisplayNameLength) {
            alert(`Імʼя має бути до ${maxDisplayNameLength} символів`);
            return;
        }

        const success = await updateUserProfileFirebase(gameState.user, { displayName: nextDisplayName });
        if (!success) {
            alert('Не вдалося зберегти імʼя');
            return;
        }

        gameState.displayName = nextDisplayName;
        updateCachedUser(gameState.user, { displayName: nextDisplayName });
        updateHeader();
        updateFriendRequestsList();
        updateFriendsList();
        showGameNotification('✅ Імʼя оновлено');
    }

    async function changePassword() {
        const currentPassword = document.getElementById('settings-current-password').value;
        const newPassword = document.getElementById('settings-new-password').value;
        const confirmPassword = document.getElementById('settings-confirm-password').value;

        if (!currentPassword || !newPassword || !confirmPassword) {
            alert('Заповніть усі поля пароля');
            return;
        }
        if (newPassword.length < minPasswordLength) {
            alert(`Новий пароль має містити мінімум ${minPasswordLength} символи`);
            return;
        }
        if (newPassword !== confirmPassword) {
            alert('Нові паролі не співпадають');
            return;
        }

        const currentUserData = await loadUserFromFirebase(gameState.user);
        if (!currentUserData || currentUserData.password !== currentPassword) {
            alert('Поточний пароль неправильний');
            return;
        }

        const success = await updateUserPasswordFirebase(gameState.user, newPassword);
        if (!success) {
            alert('Не вдалося оновити пароль');
            return;
        }

        document.getElementById('settings-current-password').value = '';
        document.getElementById('settings-new-password').value = '';
        document.getElementById('settings-confirm-password').value = '';
        showGameNotification('🔒 Пароль оновлено');
    }

    function closeAvatarModal() {
        document.getElementById('avatar-modal').classList.remove('active');
    }

    function logout() {
        // Clear typing and set offline before cleanup
        if (gameState.user) {
            if (gameState.currentChatFriend && typeof clearTypingIndicator === 'function') {
                clearTypingIndicator(gameState.user, gameState.currentChatFriend);
            }
            if (typeof setOffline === 'function') {
                setOffline(gameState.user);
            }
        }
        clearTimeout(typingTimeout);
        typingTimeout = null;

        stopChatRealtimeBridge();
        removeAllListeners();
        gameState.user = null;
        gameState.displayName = null;
        gameState.avatar = avatarGallery[0];
        gameState.balance = 0;
        gameState.friends = [];
        gameState.friendRequests = [];
        gameState.privateChatMessages = {};
        gameState.chatMessageSignatures = {};
        gameState.currentChatFriend = null;
        gameState.expandedFriendRequest = null;
        gameState.unreadCounts = {};
        gameState.friendsOnline = {};
        allUsers = {};
        document.getElementById('main-scr').style.display = 'none';
        document.getElementById('auth-scr').style.display = 'flex';
        document.getElementById('login-u').value = '';
        document.getElementById('login-p').value = '';
        document.getElementById('settings-display-name').value = '';
        document.getElementById('settings-current-password').value = '';
        document.getElementById('settings-new-password').value = '';
        document.getElementById('settings-confirm-password').value = '';
    }
</script>

</body>
</html>
